name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.12"

      - name: Install dependencies
        run: bun install

      - name: Run tests
        run: bun test

      - name: Type check (Bun transpile)
        run: |
          bun build src/server.ts --no-bundle --target bun > /dev/null
          bun build src/cli.ts --no-bundle --target bun > /dev/null

