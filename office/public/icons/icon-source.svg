<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Background with gradient matching dashboard theme -->
  <defs>
    <radialGradient id="bg" cx="50%" cy="45%" r="60%">
      <stop offset="0%" stop-color="#0d0d1a"/>
      <stop offset="100%" stop-color="#020208"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="45%" r="40%">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Dark background -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>

  <!-- Subtle glow behind character -->
  <circle cx="256" cy="240" r="160" fill="url(#glow)"/>

  <!-- BoB character (scaled and centered) -->
  <g transform="translate(256, 260) scale(4.5)">
    <!-- Head -->
    <circle cx="0" cy="-10" r="20" fill="#64b5f6" stroke="#fff" stroke-width="1.2"/>
    <!-- Hair tuft -->
    <ellipse cx="-4" cy="-28" rx="6" ry="4" fill="#64b5f6" stroke="#fff" stroke-width="0.6"/>
    <ellipse cx="4" cy="-29" rx="5" ry="3" fill="#64b5f6" stroke="#fff" stroke-width="0.6"/>
    <!-- Cat ears -->
    <polygon points="-14,-24 -18,-36 -6,-28" fill="#64b5f6" stroke="#fff" stroke-width="0.9"/>
    <polygon points="14,-24 18,-36 6,-28" fill="#64b5f6" stroke="#fff" stroke-width="0.9"/>
    <polygon points="-13,-25 -16,-33 -8,-27" fill="#ffb4b4" opacity="0.4"/>
    <polygon points="13,-25 16,-33 8,-27" fill="#ffb4b4" opacity="0.4"/>
    <!-- Eyes -->
    <circle cx="-7" cy="-12" r="4.5" fill="#fff"/>
    <circle cx="7" cy="-12" r="4.5" fill="#fff"/>
    <circle cx="-6" cy="-12" r="2.5" fill="#222"/>
    <circle cx="8" cy="-12" r="2.5" fill="#222"/>
    <circle cx="-5" cy="-13.5" r="1" fill="#fff"/>
    <circle cx="9" cy="-13.5" r="1" fill="#fff"/>
    <!-- Blush -->
    <ellipse cx="-12" cy="-7" rx="3" ry="2" fill="#ff9999" opacity="0.3"/>
    <ellipse cx="12" cy="-7" rx="3" ry="2" fill="#ff9999" opacity="0.3"/>
    <!-- Mouth -->
    <path d="M -3 -5 Q 0 -2 3 -5" fill="none" stroke="#333" stroke-width="1" stroke-linecap="round"/>
    <!-- Headphones -->
    <path d="M -17 -14 Q -18 -28 0 -30 Q 18 -28 17 -14" fill="none" stroke="#888" stroke-width="1.8"/>
    <rect x="-20" y="-18" width="6" height="10" rx="3" fill="#555" stroke="#888" stroke-width="0.6"/>
    <rect x="14" y="-18" width="6" height="10" rx="3" fill="#555" stroke="#888" stroke-width="0.6"/>
  </g>

  <!-- "BoB" text at bottom -->
  <text x="256" y="440" text-anchor="middle" fill="#22d3ee" font-family="SF Pro, -apple-system, system-ui, sans-serif" font-size="42" font-weight="200" letter-spacing="8" opacity="0.8">BoB</text>
</svg>
